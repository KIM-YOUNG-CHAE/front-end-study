<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>첨부파일 썸네일</title>
    <style>
        
        div.image {
            width: 300px;
            height: 300px;
            cursor: pointer;
            background-image: url(./img/basic.jpg);
            background-size: 100%;
            background-repeat: no-repeat;
            background-position: center;
        }

        input[type='file'] {
            display: none;
        }
        .wrap{width:300px;height:300px;display:flex;align-items:center;position:relative;}
        .cancel{display:none;position:absolute;top:12px;right:12px;z-index:10;width:20px;height:20px;background-image:url(img/cancel.png);background-size:100%;background-repeat:no-repeat;background-position:center;cursor: pointer;}
    </style>
</head>
<body>
    <form action="">
        <div class="wrap">
            <label for="attach">
                <div class="image"></div>
            </label>
            <div class="cancel"></div>
        </div>
        <input type="file" id="attach">
    </form>
</body>
<script>
    const input = document.querySelector("#attach")
    const thumbnail = document.querySelector("div.image")
    const cancel = document.querySelector(".cancel")

    input.addEventListener("change", (e) => {
        const reader = new FileReader()
        reader.readAsDataURL(e.target.files[0])
        reader.onload = (e) => {
            const result = e.target.result
            if(result.includes("image")){
                thumbnail.style.backgroundImage = `url(${result})`
                cancel.style.display = "block"
            }else {
                thumbnail.style.backgroundImage = `url(./img/basic.jpg)`
            }
        }
    })

    cancel.addEventListener("click", (e) =>{
        input.value = ""
        thumbnail.style.backgroundImage = `url(./img/basic.jpg)`
        e.target.style.display = "none"
    })

</script>
</html>
