<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트 리스너</title>
</head>
<body>
    <h3>CSS 스타일 동적 변화</h3>
    <hr />
    <p>변경할 요소😎</p>
    <button>버튼 클릭</button>
</body>
<script>
    const button = document.querySelector("button")
    button.addEventListener("click", () =>{
        document.querySelector("p").style.color = "red"
    })
</script>
</html>
